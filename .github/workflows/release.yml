name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

concurrency:
  group: qemu-static-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build qemu-static
        id: build
        run: tools/build-qemu.sh "${{ matrix.arch }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qemu-static-${{ matrix.arch }}
          path: |
            out/${{ steps.build.outputs.artifact_name }}
            out/${{ steps.build.outputs.artifact_name }}.sha256
          if-no-files-found: error

      - name: Attest release artifact
        id: attest
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            out/${{ steps.build.outputs.artifact_name }}
            out/${{ steps.build.outputs.artifact_name }}.sha256

      - name: Normalize attestation bundle filename
        run: |
          mv \
            "${{ steps.attest.outputs.bundle-path }}" \
            "out/${{ steps.build.outputs.artifact_name }}.attestation.jsonl"

      - name: Upload attestation bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: qemu-static-${{ matrix.arch }}.attestation
          path: out/${{ steps.build.outputs.artifact_name }}.attestation.jsonl
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download workflow artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: qemu-static-*
          path: out
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          mapfile -t assets < <(find out -maxdepth 1 -type f | sort)
          tools/create-release.sh "${TAG_NAME}" "${assets[@]}"
