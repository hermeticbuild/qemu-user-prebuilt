name: release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string

concurrency:
  group: qemu-static-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build qemu-static
        id: build
        run: tools/build-qemu.sh "${{ matrix.arch }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-static-${{ matrix.arch }}
          path: |
            out/qemu-user-linux-${{ matrix.arch }}-*
          if-no-files-found: error

      - name: Attest release artifact
        id: attest
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            out/qemu-user-linux-${{ matrix.arch }}-*

      - name: Normalize attestation bundle filename
        run: |
          mv \
            "${{ steps.attest.outputs.bundle-path }}" \
            "out/${{ steps.build.outputs.attestation_name }}"

      - name: Upload attestation bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-static-${{ matrix.arch }}.attestation
          path: out/${{ steps.build.outputs.attestation_name }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download workflow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: qemu-static-*
          path: out
          merge-multiple: true

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          mapfile -t assets < <(find out -maxdepth 1 -type f | sort)
          tools/create-release.sh "${TAG_NAME}" "${assets[@]}"
